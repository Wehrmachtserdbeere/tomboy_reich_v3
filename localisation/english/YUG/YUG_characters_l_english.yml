l_english:
  YUG_LEADER_MILAN_STOJADINOVIC_NAME: "Milan Stojadinović"
  YUG_LEADER_MILAN_STOJADINOVIC_DESC: "As th prime minister of Yugoslavia, Milan is generally controversial, being seen as favoring Serbian interests over that of the other South Slavs, and causing controversies and forming pacts that diplomatically isolated the country on the international stage.\n\n\"One king, one nation, one state, prosperity at home, peace on the borders.\""
  YUG_LEADER_PETER_II_NAME: "Peter II."
  YUG_LEADER_PETER_II_DESC: "Succeeding his father Alexander I. in 1934, Peter is seen as an important and integral part to the country's identity, symbolizing the powerful and youthful spirit of the South Slavic people.\n\n\"Yugoslavia will be free, of foreign actors, influence, and meddling.\""
  YUG_LEADER_JOSIP_BROZ_TITO_NAME: "Josip Broz Tito"
  YUG_LEADER_JOSIP_BROZ_TITO_DESC: "A deeply devoted but fiercely nationalist communist, Tito is a widely loved leader who seeks to truly push Yugoslavia into the 20th century through hard industrialization and the establishment of a national defense against any threats inside and outside the border.\n\n\"We have spilt an ocean of blood for the brotherhood and unity of our peoples and we shall not allow anyone to touch or destroy it from within.\""
  YUG_LEADER_DIO_BRANDO_NAME: "Dio Brando"
  YUG_LEADER_DIO_BRANDO_DESC: "Originally from England, the young Dio is a charismatic and fierce politician. Initially coming to Yugoslavia prior to the Anime War for a still-unknown search, he became a prominent figure in the nation's political landscape.\n\n\"The wailing of starving stray dogs... This severely cold winter! They're also desperately trying to survive!\""
  YUG_LEADER_DIO_WORLD_NAME: "DIO"
  YUG_LEADER_DIO_WORLD_DESC: "Somehow able to appear and disappear at will, DIO is a force to be reckoned with. An air of misfortune surrounds him, as any who dare go against him and refuse his so-called mercy quickly pass away in freak accidents.\n\n\"Everyone survives in pursuit of peace of mind... Aren't you uneasy, preparing to fight me, knowing you may die? If you join me, I will give you peace of mind that will last forever.\""
  YUG_LEADER_DIO_HEAVEN_NAME: "The Noble One"
  YUG_LEADER_DIO_HEAVEN_DESC: "Willing to sacrifice his organization, his vampiric abilities, his Stand, everything - he achieved §WHeaven§!.\n\n\"Reality... bend to my will!\""
  YUG_LEADER_DIMITRIJE_LJOTIC_NAME: "Dimitrije Ljotić"
  YUG_LEADER_DIMITRIJE_LJOTIC_DESC: "Driven by an intense fusion of Orthodox Christian mysticism and corporate authoritarianism, Dimitrije Ljotić stands as the ideologue of the Yugoslav National Movement, ZBOR. He views Western liberalism and Soviet communism as twin plagues threatening to tear Yugoslavia apart. For Ljotić, the survival of the South Slavs depends on a spiritual awakening, absolute loyalty to the Crown, and the forging of a disciplined, agrarian corporate state.\n\n\"Only a nation anchored in God and unified under one iron will can survive the gathering storm.\""