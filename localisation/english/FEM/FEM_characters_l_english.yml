l_english:
  FEM_LEADER_LUKA_URUSHIBARA_NAME: "Luka Urushibara"
  FEM_LEADER_LUKA_URUSHIBARA_DESC: "Previously working as a male shrine maiden at the Yanabayashi Shrine, Luka has unintentionally become the leader of the democrats.\n\n\"Even on a sad day like this I'd prefer to embrace you rather than trying to forget.\""
  FEM_LEADER_ASTOLFO_NAME: "Astolfo"
  FEM_LEADER_ASTOLFO_DESC: "Astolfo, class name Rider of \"Black\", is one of the Twelve Paladins of Charlemagne and the son of an English king. Although considered weak among the Twelve Paladins, he's still considerably stronger than most others.\n\nHe became the leader of the royalist factions due to his unmatched charisma and a personality cult that easily formed around him without any of his own input. Many of his supporters possess a plush toy of him, in the form of a bean.\n\n\"Astolfo of the Twelve Paladins of Charlemagne flutters and scatters! Oh, I'm not going anywhere, though.\""
  FEM_LEADER_SCHROEDINGER_NAME: "Schrödinger"
  FEM_LEADER_SCHROEDINGER_DESC: "Warrant Officer Schrödinger, also known as the Cheshire Cat, is a charismatic young man of unknown age, who became the leader of the National Socialists in [FEM.GetNameDef]. Having the nature of being everywhere and nowhere, it seems that he is able to appear anywhere he likes.\n\n\"Hey, Fräulein...\""
  FEM_LEADER_TET_NAME: "Tet"
  FEM_LEADER_TET_DESC: "The so-called \"God of Play\", Tet appears to be a small child, but is actually over six thousand years old. He exhibits a cheerful and playful demeanor, and has an aversion to violence and conflict. Despite prefering to be a spectator and observe, his charm led to many people, especially the communists, to make him the leader of the Minaist movement.\n\n\"From this piece of Heaven, I command that there will be no plundering or bloodshed.\""