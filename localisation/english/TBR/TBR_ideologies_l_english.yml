l_english:
  democratic: "Democratic"
  democratic_desc: "Democratic State"
  free_conservatism: "Free Conservatism"
  free_conservatism_desc: "Aiming for a stable society, the Free Conservatives favor reasonably modern values and quasi-conservative policies."
  traditionalism: "Traditionalism"
  traditionalism_desc: "Traditionalism is a political ideology that emphasizes returning to past cultural traditions and values under the belief that they are superior to modern ones. It often supports conservative social norms and opposes change."
  liberalism: "Liberalism"
  liberalism_desc: "Liberalism is an ideology that advocates for individual freedom, democracy, and social progress. It typically emphasizes economic liberty, civil rights, and the role of government in promoting social welfare."
  democratic_socialism: "Democratic Socialism"
  democratic_socialism_desc: "Democratic Socialism combines elements of socialism with a commitment to liberal values such as individual freedom and democracy. It aims for a society where both private enterprise and public ownership play important roles, with an emphasis on social justice and equality."

  communism: "Communism"
  communism_desc: "Totalitarian Regime"
  third_worldism: "Third Worldism"
  third_worldism_desc: "Refusing to align with either pro or anti-anime reactionism, Third Worldism is a general term for numerous non-aligned Communist regimes all around the world."
  marxism: "Marxism"
  marxism_desc: "Marxism is an ideology that emphasizes class struggle and the role of the working class in social progress. It advocates for a society where private property is abolished and the state plays a central role in organizing production."
  minaism: "Minaism"
  minaism_desc: "Following the teachings and practices of Kagane Mina, Minaism is an ideology that emphasizes simplicity, harmony with nature, and the pursuit of inner peace. It advocates for a society where people live in close-knit communities and work together to achieve common goals."
  anarcho_communism: "Anarcho-Communism"
  anarcho_communism_desc: "Anarcho-Communism is an ideology that emphasizes the abolition of private property, the state, and social hierarchy. It advocates for a society where people live in self-managed communities and work together in local, often self-sufficient cooperatives."

  pro_anime_reactionism: "Pro-Anime Reactionism"
  pro_anime_reactionism_desc: "Pro-Anime Regime"
  pa_nazism: "Pro-Anime National Socialism"
  pa_nazism_desc: "Pro-Anime National Socialism is an ideology that emphasizes the importance of anime people and their role in shaping national identity. It advocates for a society where anime people are valued and respected, and where anime culture plays a central role in national life. In comparison to the fictional \"Hitlerian\" National Socialism, Pro-Anime National Socialism is more focused on the cultural aspects of anime and the sub-race of the anime peoples rather than a subset of the White race."
  pa_fascism: "Pro-Anime Fascism"
  # This is literally just Italian Fascism.
  pa_fascism_desc: "Pro-Anime Fascism is an ideology that emphasizes the importance of the state and its role in shaping national identity. It advocates for a society rules by natural hierarchy and order, in which the state plays a central role in regulating social life and maintaining order."
  pa_ultranationalism: "Pro-Anime Ultranationalism"
  pa_ultranationalism_desc: "Coming from a national supremacist background, Pro-Anime Ultranationalism is a generalized ideology encompassing a multitude of ideas related to nationalism, irredentism, and in some cases, ethnic supremacy. It emphasizes the importance of the nation's cultural heritage and its role in shaping national identity."
  pa_anime_supremacy: "Anime Supremacy"
  pa_anime_supremacy_desc: "Anime Supremacy is an umbrella term for several pro-Anime ideologies, which put the emphasis on the genetic supremacy of anime peoples. While it can range from capitalist to socialist in nature, it generally emphasizes the importance of anime peoples' cultural heritage and their role in shaping national identity, while other issues such as social or economic policies are often secondary."
  pa_accelerationism: "Pro-Anime Accelerationism"
  pa_accelerationism_desc: "Aiming for the radical transformation of society through violent or even terroristic means, Pro-Anime Accelerationism is a pro-Anime ideology that seeks to brutally accelerate society to its end, in order to shape a new world from its ashes."

  anti_anime_reactionism: "Anti-Anime Reactionism"
  anti_anime_reactionism_desc: "Anti-Anime Regime"
  aa_nazism: "Anti-Anime National Socialism"
  aa_nazism_desc: "Anti-Anime National Socialism is an ideology that emphasizes the importance of national identity and cultural heritage, while also rejecting or outright fighting the influence and existence of anime people in society."
  aa_fascism: "Anti-Anime Fascism"
  aa_fascism_desc: "Anti-Anime Fascism is an ideology that seeks to maintain a strong sense of national unity and order under the banner of the state, as stated in the 1927 essay 'The Doctrine of Fascism' by Giovanni Gentile and Benito Mussolini. A foundational aspect of anti-anime reactionism is its opposition to the existence and influence of anime people in society."
  aa_ultranationalism: "Anti-Anime Ultranationalism"
  aa_ultranationalism_desc: "Anti-Anime Ultranationalism is an ideology that emphasizes the importance of national identity and cultural heritage, while also outright fighting the influence and existence of anime people in society. Due to the violent nature of ultranationalism in general, the anti-anime reactionalist movement has often partaken in brutal suppression and harassment of anime people."
  aa_human_supremacy: "Human Supremacy"
  aa_human_supremacy_desc: "Human Supremacy is an ideology that asserts the superiority of humans over all other living beings, mainly as a counter to the influence of anime people. This ideology often leads to the suppression and marginalization of anime people in society."
  aa_accelerationism: "Anti-Anime Accelerationism"
  aa_accelerationism_desc: "Anti-Anime Accelerationism is an unbrella term that encompasses a wide variety of ideologies that attempt to accelerate the progress of society through terroristic means, often with a focus on the ultimate extermination of anime people."

  neutrality: "Non-Aligned"
  neutrality_desc: "Authoritarian Regime"
  despotism: "Despotism"
  despotism_desc: "A generalized term for any form of government where one person or group holds supreme power over others."
  oligarchsim: "Oligarchism"
  oligarchism_desc: "An oligarchy is a state in which the ruling class consists of a small number of people who hold most of the political and economic power."
  isolationism: "Political Isolationism"
  isolationism_desc: "Political Isolationism refers to a policy of maintaining a country's independence from external influences, especially foreign powers, regardless of the country's internal affairs or global events."
  centrism: "Centrism"
  centrism_desc: "Centrism is a political ideology that emphasizes moderation and balance between different groups or parties, without offending or supporting any particular group more than others."
  monarchism: "Monarchism"
  monarchism_desc: "Monarchism is a form of government in which the head of state is a monarch, who typically inherits their position from their family line. Often, this family line has been in power for many generations and is considered to be the legitimate ruling dynasty."
  ani_impedialism: "Anime Imperialism"
  ani_imperialism_desc: "Exclusively practiced in [ANI.GetNameDef], Anime Imperialism refers to a policy of expanding the influence and territory of the realm, often through military conquest or cultural assimilation. A main staple of this ideology is the practice of granting conquered lands to various sub-groups of anime people as fiefs."
  failed_state: "Failed State"
  failed_state_desc: "A failed state is a political entity that has lost its ability to effectively govern itself, often due to internal strife or external pressures. Failed states can range from minor regions with limited resources to major nations facing significant challenges in maintaining stability and order. Although people may still live there, there is no de-jure governmental authority to provide basic services or enforce laws."




  pro_anime_reactionism_drift: "Daily Pro-Anime Reactionism Support"
  pro_anime_reactionism_drift_tt: " $pro_anime_reactionism_drift$: $RIGHT|+=2$"
  anti_anime_reactionism_drift: "Daily Anti-Anime Reactionism Support"
  anti_anime_reactionism_drift_tt: " $anti_anime_reactionism_drift$: $RIGHT|+=2$"