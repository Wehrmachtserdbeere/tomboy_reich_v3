l_english:
  TBR_IDEA_COUNTRY_anime_people: "Anime Population"
  TBR_IDEA_COUNTRY_anime_people_desc: "§CHomo Nihonensis§!\n[THIS.GetNameDefCap] has a majority Anime population."
  TBR_IDEA_COUNTRY_human_people: "Human Population"
  TBR_IDEA_COUNTRY_human_people_desc: "§CHomo Sapiens§!\n[THIS.GetNameDefCap] has a majority Human population."
  TBR_IDEA_COUNTRY_mixed_people: "Mixed Anime-Human Population"
  TBR_IDEA_COUNTRY_mixed_people_desc: "§CHomo Sapiens§! and §CHomo Nihonensis§! share their country with each other, mostly peacefully."
  TBR_IDEA_COUNTRY_fought_in_anime_war: "Anime War Participant"
  TBR_IDEA_COUNTRY_fought_in_anime_war_desc: "The Anime War was bloody and our people are tired and exhausted. They don't want any more wars. This weary disposition weighs heavy on us all."

  TBR_IDEA_ECONOMY_armed_isolationism: "Armed Isolationism"
  TBR_IDEA_ECONOMY_armed_isolationism_desc: "Rejecting the idea of globalization, or simply arming for full self-sufficiency, [THIS.GetNameDef] has a strong military presence and is largely isolated from other nations."
  TBR_IDEA_ECONOMY_isolationism: "Isolationism"
  TBR_IDEA_ECONOMY_isolationism_desc: "Aiming for self-sufficiency, [THIS.GetNameDef] has taken steps to reduce its reliance on foreign goods and services, effectively isolating itself from the global economy."
  TBR_IDEA_ECONOMY_young_economy: "Young Economy"
  TBR_IDEA_ECONOMY_young_economy_desc: "This nation has recently become its own economy, and still struggles with establishing it."
  TBR_IDEA_ECONOMY_civilian_economy: "Civilian Economy"
  TBR_IDEA_ECONOMY_civilian_economy_desc: "The economy is focused on civilian needs, with the military having to fight over crumbs."
  TBR_IDEA_ECONOMY_early_mobilization: "Early Mobilization"
  TBR_IDEA_ECONOMY_early_mobilization_desc: "The military industrial complex is slowly chugging into a workable sector to prepare for any violent eventualities."
  TBR_IDEA_ECONOMY_partial_mobilization: "Partial Mobilization"
  TBR_IDEA_ECONOMY_partial_mobilization_desc: "With the shadows of conflict drawing closer, the economy has shifted to the initial process of mobilizing for war."
  TBR_IDEA_ECONOMY_war_economy: "War Economy"
  TBR_IDEA_ECONOMY_war_economy_desc: "The economy is mostly directed towards the military, with the civilians taking the short end of the stick."
  TBR_IDEA_ECONOMY_total_war: "Total War"
  TBR_IDEA_ECONOMY_total_war_desc: "The country is in deep trouble, and the entire economy is geared to the war effort, with only the most essential and basic production being targeted towards the civilian sector."

  TBR_IDEA_TRADE_ai_driven_economy: "AI-Driven Economy"
  TBR_IDEA_TRADE_ai_driven_economy_desc: "The economy is controlled by a state-of-the-art artificial intelligence, ensuring maximum profits at minimum risk."
  TBR_IDEA_TRADE_closed_economy: "Closed Economy"
  TBR_IDEA_TRADE_closed_economy_desc: "The economy is closed to the outside, whether for the good of the people, or not."
  TBR_IDEA_TRADE_limited_trade: "Limited Trade"
  TBR_IDEA_TRADE_limited_trade_desc: "We permit highly controlled and restricted trade with foreign nations."
  TBR_IDEA_TRADE_mixed_economy: "Mixed Economy"
  TBR_IDEA_TRADE_mixed_economy_desc: "A balanced mixture of import and export ensures we always have a balanced budget."
  TBR_IDEA_TRADE_export_economy: "Export Economy"
  TBR_IDEA_TRADE_export_economy_desc: "When we can make profit with out excess production capacity, why shouldn't we?"
  TBR_IDEA_TRADE_free_trade: "Free Trade"
  TBR_IDEA_TRADE_free_trade_desc: "Any nation can buy from us and we can buy from any nation that permits it, this is a simply win-win situation for all involved."
  TBR_IDEA_TRADE_globalized_trade: "Globalized Trade"
  TBR_IDEA_TRADE_globalized_trade_desc: "We're less a producer as we are the hegemon of the world industries, what we produce becomes the trend, what we cease to produce becomes treasured rarities."

  TBR_IDEA_MANPOWER_disarmed_nation: "Disarmed Nation"
  TBR_IDEA_MANPOWER_disarmed_nation_desc: "Whether by force or by choice, we have a negligible military force."
  TBR_IDEA_MANPOWER_volunteers_only: "Volunteers Only"
  TBR_IDEA_MANPOWER_volunteers_only_desc: "Joining the military is based on volunteering, resulting in a limited but combat-worthy manpower pool."
  TBR_IDEA_MANPOWER_conscription: "Conscription"
  TBR_IDEA_MANPOWER_conscription_desc: "There are explicit conscription laws in place to ensure the nation has a good amount of reserve manpower."
  TBR_IDEA_MANPOWER_extensive_conscription: "Extensive Conscription"
  TBR_IDEA_MANPOWER_extensive_conscription_desc: "Conscription is broadened and barriers to entry are lowered to increase the pool of usable manpower."
  TBR_IDEA_MANPOWER_required_service: "Required Service"
  TBR_IDEA_MANPOWER_required_service_desc: "Military service is required of all able-bodied young men."
  TBR_IDEA_MANPOWER_all_adults_serve: "All Adults Serve"
  TBR_IDEA_MANPOWER_all_adults_serve_desc: "By law, all adults must serve the military the moment they are tasked to."
  TBR_IDEA_MANPOWER_all_serve: "All Serve"
  TBR_IDEA_MANPOWER_all_serve_desc: "Everyone, from young to old, from strong to fragile, is required to serve the military. Children may not be good at precision, but we don't need 'good', we need 'able to'."