l_english:
  ITA_LEADER_BENITO_MUSSOLINI_NAME: "Benito Mussolini"
  ITA_LEADER_BENITO_MUSSOLINI_DESC: "Leader of the Fascists in Italy, Benito Mussolini is a generally controversial figure for his methods of intimidating his opponents and setting the world upside-down. He seized power with his Blackshirts a few months before the Arrival, and has proven to be a competent leader.\n\n\"It is better to live one day as a lion than a hundred years as a sheep.\""
  ITA_LEADER_PIETRO_NENNI_NAME: "Pietro Nenni"
  ITA_LEADER_PIETRO_NENNI_DESC: "A veteran fighter for the working class, Pietro Nenni stands as one of the most prominent figures of Italian socialism. Having spent years enduring exile and fascistic suppression, he remains completely unbowed in his dedication to the proletariat. His vision for Italy is clear: to tear down the remnants of autocratic rule and forge a radical, anti-fascist socialist republic built on democratic worker solidarity and social justice.\n\n\"The masses do not merely want bread; they demand the keys to their own destiny.\""
  ITA_LEADER_ALCIDE_DE_GASPERI_NAME: "Alcide De Gasperi"
  ITA_LEADER_ALCIDE_DE_GASPERI_DESC: "Representing the voice of Christian Democracy and centrist moderation, Alcide De Gasperi is a seasoned statesman who has long navigated the turbulent waters of Italian politics. Guided by deeply held Catholic social teachings and a commitment to constitutional liberty, he seeks to rebuild Italy as a stable, pluralistic democracy. For De Gasperi, the path forward lies in healing a fractured nation through economic cooperation and moral renewal.\n\n\"A nation's true strength is measured not by its weapons, but by its justice and freedom.\""
  ITA_LEADER_VICTOR_EMMANUEL_III_NAME: "Victor Emmanuel III."
  ITA_LEADER_VICTOR_EMMANUEL_III_DESC: "King of Italy since 1900, Victor Emmanuel III. is a symbol of Italian unity and national identity.\n\n\"A republican form of government is not suited to the Italian people.\""
  ITA_LEADER_UMBERTO_II_NAME: "Umberto II."
  ITA_LEADER_UMBERTO_II_DESC: "The Prince of Piedmont and heir to the ancient House of Savoy, Umberto II carries the heavy burden of Italy's royal legacy. Caught between the traditional prestige of the monarchy and the tumultuous political factions vying for control of Italy, he represents the old guard's hope for continuity and national unity. His primary objective is to maintain the crown as a stabilizing symbol above the chaos of partisan struggle.\n\n\"The throne does not belong to a single faction; it stands as the shield of all Italy.\""
  ITA_LEADER_ANCHOVY_NAME: "Chiyomi \"Anchovy\" Anzai"
  ITA_LEADER_ANCHOVY_DESC: "Strategically picking her battles and tactically destroying her enemies, Anchovy is a powerful force to be reckoned with.\n\n\"Let's think about it after a round of pasta.\""