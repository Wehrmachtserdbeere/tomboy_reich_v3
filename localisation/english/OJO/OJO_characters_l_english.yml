l_english:
  OJO_LEADER_SHIRO_NAME: "Queen Shiro"
  OJO_LEADER_SHIRO_DESC: "Immortal Queen Shiro, Her Majesty, is a young, genious girl, who is also the Queen of the Commonwealth of Elkia. She can speak an astounding eighteen languages, and has won every game of chess she has ever played, including against Grand Masters.\n\n\"You really, are... 'empty'...\""
  OJO_LEADER_NONNA_NAME: "Nonna"
  OJO_LEADER_NONNA_DESC: "Motherly, calm, and composed, this is what Nonna is, and she will lead any of her followers through even the most arduous battle. Her leadership of the Communists came less from a love for the ideals, but because the ideals of it were coincidentally exactly what she desires, and thus her influence quickly and easily grew.\n\n\"Even when I'm gone, you'll definitely win.\""
  OJO_LEADER_SATSUKI_KIRYUUIN_NAME: "Satsuki Kiryuuin"
  OJO_LEADER_SATSUKI_KIRYUUIN_DESC: "Satsuki Kiryuuin is the widely-revered president of Honnoji Academy's Student Council, and the ruler over the lands surrounding the Academy. Despite her open belief that the 'weak and foolish' must be ruled, and referring to people as 'pigs in human clothing', she gained wide support and became the de-facto leader of the Fascists.\n\n\"Ask not the sparrow how the eagle soars!\""
  OJO_LEADER_ARTORIA_PENDRAGON_NAME: "Artoria Pendragon"
  OJO_LEADER_ARTORIA_PENDRAGON_DESC: "Self-proclaimed King Arthur and King of Knights, Artoria is a noble and chivalrous leader who has a strong sense of justice. She is known for her unwavering dedication to her ideals and her people, and is respected by many for her leadership skills and her ability to inspire others.\n\n\"This is a battle to save humanity. Our duty is the heaviest of all.\""