l_english:
  GER_LEADER_KONRAD_ADENAUER_NAME: "Konrad Adenauer"
  GER_LEADER_KONRAD_ADENAUER_DESC: "Democracy and industrial advancement are what define Adenauer. Seeking friendship with America, Britain, and France, he seeks to establish a peaceful and united Western world.\n\n\"In view of the fact that God limited the intelligence of man, it seems unfair that he did not also limit his stupidity.\""
  GER_LEADER_ERNST_THAELMANN_NAME: "Ernst Thälmann"
  GER_LEADER_ERNST_THAELMANN_DESC: "One of the founding fathers of modern Socialism, Ernst is a fierce fighter and ideologue of Socialism as taught by Marx, Engels, and most importantly, Lenin and Stalin. Near-fanatical, he's kept in check by his fellow communists.\n\n\"The most valuable thing a human owns is their life; They must spend it all for the struggle to liberate mankind!\""
  GER_LEADER_WILHELM_II_NAME: "Wilhelm II."
  GER_LEADER_WILHELM_II_DESC: "Previously disgraced after the Great War, Kaiser Wilhelm II brought his honor back in the battles he personally led in the Anime War. Although quite aged by now, he still rules with the grace and efficiency of someone who has seen the darkest of pits before.\n\n\"There is only one person who is master in this Empire and I am not going to tolerate any other.\""
  GER_LEADER_WILHELM_III_NAME: "Wilhelm III."
  GER_LEADER_WILHELM_III_DESC: "Son of Wilhelm II, Wilhelm III hasn't seen the depths of hell in the Anime War, as his father shielded him from service, but having studied the Great War and the Anime War extensively, most people are sure he will lead the nation to prosperity.\n\n\"Germany has found good friends in Austria and Poland.\""
  GER_LEADER_VIKTORIA_NAME: "Viktoria I."
  GER_LEADER_VIKTORIA_DESC: "Prussian princess and famous tomboy, Viktoria Louise of Prussia is the most important symbol of post-war reconciliation between the Human and Anime powers in Europe. Although popular among the youth, her cordial approach to issues relating to the Anime Empire and its subjects leave many veterans and members of the old guard estranged and angry with her.\n\n\"May I be more fortunate than Barbarossa, and better than Karl.\""
  GER_LEADER_GREGOR_STRASSER_NAME: "Gregor Strasser"
  GER_LEADER_GREGOR_STRASSER_DESC: "As the champion of the anti-capitalist, socialist wing of the National Socialist movement, Gregor Strasser represents the radical working-class alternative for Germany. Having broken with or outmaneuvered the purely reactionary forces, his vision is one of a true national syndicalist revolution - dismantling the power of old junkers and industrialists to forge a state built entirely on corporate labor and German blood.\n\n\"The 'National' without the 'Socialist' is nothing but a lie to protect the elite.\""
  GER_LEADER_HERMANN_GORING_NAME: "Hermann Göring"
  GER_LEADER_HERMANN_GORING_DESC: "A charismatic war hero of the skies, Hermann Göring commands immense popularity among the military elite and industrial titans of Germany. Known for his extravagant lifestyle and iron-fisted pragmatism, he cares little for rigid ideological dogmas, focusing instead on rapid militarization, industrial mobilization, and total economic self-sufficiency. Under his rule, the state serves as a machine to project raw, unyielding power.\n\n\"Iron has always made an empire strong; butter only makes a people soft.\""
  GER_LEADER_ADOLF_HITLER_NAME: "Adolf Hitler"
  GER_LEADER_ADOLF_HITLER_DESC: "Leader of the National Socialists in Germany, he seeks the revitalization of Germany and the return of its Eastern territories.\n\n\"I am not crazy enough to want a war. The German people have but one wish - to be happy in their own way and to be left in peace. They do not interfere in other people's business, and others should not interfere in theirs. When have the German people ever broken their words?\""