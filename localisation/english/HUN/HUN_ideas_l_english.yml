l_english:
  HUN_IDEA_COUNTRY_treaty_of_trianon: "Treaty of Trianon"
  HUN_IDEA_COUNTRY_treaty_of_trianon_desc: "A national shame is imposed on us and keeps our once beautiful nation small and weak. Not only this, but our lands have been taken from us, our proud soldiers were disarmed, and we're reduced to nothing more than an easy pawn in world affairs."