l_english:
  HUN_LEADER_MIKLOS_HORTHY_NAME: "Horthy Miklós"
  HUN_LEADER_MIKLOS_HORTHY_DESC: "Regent of a nation without a king, Admiral of a landlocked state, Miklós is certainly an interesting individual, having taken power in 1920, he has been ruling a neutral Hungary through the terrible Anime War. Now, as a fragile peace has fallen onto Europe, he must steer Hungary through the [ANI.GetAdjective]-[CEU.GetAdjective] influences.\n\n\"To Hungary's defence and protection I dedicated my life.\""
  HUN_LEADER_OTTO_VON_HABSBURG_NAME: "Otto von Habsburg"
  HUN_LEADER_OTTO_VON_HABSBURG_DESC: "Otto, the eldest son of Austro-Hungarian Emperor Charles I., and head of the House of Habsburg-Lorraine.\n\n\"Heavy is the head that wears the crown.\""
  HUN_LEADER_MATYAS_RAKOSI_NAME: "Rákosti Mátyás"
  HUN_LEADER_MATYAS_RAKOSI_DESC: "A steadfast, Jewish-Hungarian disciple of the Comintern, Mátyás Rákosi has spent years in the shadows of the Hungarian underground and the prison cells of the Horthy regime. With the coming of the year 1936, his eyes are fixed entirely on dismantling the conservative regency and transforming [HUN.GetName] into a frontline vanguard of the global proletarian revolution, strictly aligned with Moscow.\n\n\"The workers of Hungary will not bow to feudal regents forever; the dawn of the Soviet republic is inevitable.\""
  HUN_LEADER_HUNGARIA_NAME: "Hungaria"
  HUN_LEADER_HUNGARIA_DESC: "Initially sent as a diplomat during the early stages of the Anime War, Hungaria has shown her deep affection for Hungary and the Magyar people through personal diplomacy and regular interactions with the common people. Although affiliated with [ANI.GetNameDef], she swears her first and foremost allegiance to the Hunagrian people.\n\n\"The political world is best suited for sadists and masochists.\""
  HUN_LEADER_FERENC_SZALASI_NAME: "Szálasi Ferenc"
  HUN_LEADER_FERENC_SZALASI_DESC: "A former major of the General Staff, Ferenc Szálasi has traded his military uniform for the mantle of ultra-nationalist prophecy. As the fanatical architect of 'Hungarism,' he rejects both Western democracy and Soviet communism, seeking instead to resurrect the borders of ancient Lands of Saint Stephen through a totalitarian, corporate state. His Arrow Cross movement stands ready to cleanse [HUN.GetName] of foreign influence and lead the Carpathian basin into a radical new order.\n\n\"The Hungarian nation does not merely survive; it dominates by divine right.\""