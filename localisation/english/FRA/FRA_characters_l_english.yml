l_english:
  FRA_LEADER_LEON_BLUM_NAME: "André Léon Blum"
  FRA_LEADER_LEON_BLUM_DESC: "Heavily influenced by the Dreyfus affair due to his jewish background, André Léon Blum is a dedicated democratic socialist, seeking the liberation of the workers through democratic means.\n\n\"Morality may consist solely in the courage of making a choice.\""
  FRA_LEADER_MAURICE_THOREZ_NAME: "Maurice Thorez"
  FRA_LEADER_MAURICE_THOREZ_DESC: "Harboring deep admiration for Joseph Stalin, Maurice Thorez is the Georgian's puppet in France, seeking to bring the revolution and a renewed red terror to France.\n\n\"The German people must make reparation.\""
  FRA_LEADER_JEANNE_D_ARC_NAME: "Jeanne d'Arc"
  FRA_LEADER_JEANNE_D_ARC_DESC: "Claiming to be the patron saint of France herself, guided by visions from Archangel Michael, Saint Margaret, and Saint Catherine, Joanne d'Arc is a controversial figure. According to her, she was murdered by the English in 1431, which led her to a violent hatred against the English, which shows itself in her political messages. This, in combination with the fresh wound of the Anime War, caused her already low popularity to hit rock-bottom. Time will tell if she can come to power or not.\n\n\"I will always be at your side. As long as we are together, I can overcome any hardship or sorrow.\""
  FRA_LEADER_PHILIPPE_PETAIN_NAME: "Philippe Pétain"
  FRA_LEADER_PHILIPPE_PETAIN_DESC: "Veteran of the Great War and the Anime War, Pétain is a famous figure among the French population. His involvement in politics came as a side-effect of his strong opinions about the Anime nations, the direction of the nation, and the demand to get the lost lands back.\n\n\"Neither Germany nor Italy have doubts. Our crisis is not a material crisis. We have lost faith in our destiny... We are like mariners without a pilot.\""
  FRA_LEADER_CHARLES_MAURRAS_NAME: "Charles Maurras"
  FRA_LEADER_CHARLES_MAURRAS_DESC: "A radical centrist, Charles Maurras believes that taking a moderate amount of ideas from every ideology is the best way to synthesize a coherent ideology.\n\n\"That France may live, the King must return.\""
  FRA_LEADER_NAPOLEON_VI_NAME: "Napoléon VI."
  FRA_LEADER_NAPOLEON_VI_DESC: "Louis, Prince Napoléon, also known as Napoléon VI., is the great-great-nephew of Napoléon I., the Emperor of France. Monarchists all around France support his ascendancy to the throne, and cheer for the return of a truly glorious French Empire.\n\n\"Promise nothing, and deliver everything.\""