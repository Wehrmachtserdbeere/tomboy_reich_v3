l_english:
  UKR_LEADER_KOST_LEVYTSKY_NAME: "Kost Levytsky"
  UKR_LEADER_KOST_LEVYTSKY_DESC: "Leader of the Ukrainian National Democratic Alliance in the Eastern CEU, Kost is a determined, democratic politician for the continued freedom of Ukraine.\n\n\"Ukraine still yet lives!\""
  UKR_LEADER_NIKITA_KRUSHCHYOV_NAME: "Nikita Krushchyov"
  UKR_LEADER_NIKITA_KRUSHCHYOV_DESC: "Aspiring governor of the Ukrainian SSR, Nikita now serves as the head of the Ukrainian communists, convinced of the effectiveness of Marx, Engels, and Lenin's ideas.\n\n\"Politicians are the same all over. They promise to build bridges even when there are no rivers.\""
  UKR_LEADER_STEPAN_BANDERA_NAME: "Stepan Bandera"
  UKR_LEADER_STEPAN_BANDERA_DESC: "Proud Ukrainian nationalist, Stepan leads the Ukrainian nationalists in the fight for the continued Ukrainian independence. Although many of his ideas are considered radical, most Ukrainians see him as a tolerable leader at worst.\n\n\"Even the best opportunities and readiness to help will not give up if the nation itself does not fight and forge its own destiny by its own struggle.\""
  UKR_LEADER_MILITARY_GOVERNMENT_NAME: "Military Government"
  UKR_LEADER_MILITARY_GOVERNMENT_DESC: "The Military Government is made up of many top-ranking Ukrainian generals and ministers, seeking a renewed, actual government.\n\n\"To serve Ukraine!\""
  UKR_LEADER_FRITHUGARDA_GAUTS_NAME: "Friþugarda Gauts"
  UKR_LEADER_FRITHUGARDA_GAUTS_DESC: "Friþugarda claims direct descendance from the Gothic god Gaut, who is the mythical ancestor of the Geats, Goths, and Gutes, as well as their main deity. She arrived in Ukraine soon after the Arrival, already claiming divine Gothic descendance. \n\n\"Gibaiþ rum, þiudōs, unsaraim gagga, weis sijuþ saistans Gutans, ni bairam kruþō, ak bairam dauþana.\""
  UKR_LEADER_MARICHKA_NAME: "Marichka"
  UKR_LEADER_MARICHKA_DESC: "Marichka is an ardent Ukrainian nationalist, seeking revenge against Russia for crimes they committed in Marichka's original world. She came to Ukraine soon after the Arrival and quickly became a high-ranking military commander.\n\n\"Glory to Ukraine!\""