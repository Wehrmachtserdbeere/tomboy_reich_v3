l_english:
  ANI_LEADER_KIRISAME_MIDOKA_NAME: "Kirisame Midoka"
  ANI_LEADER_KIRISAME_MIDOKA_DESC: "A conservative at heart, Midoka is known for her steadfastness and dedication to the principles of free conservatism.\n\n\"The Empire... it's not in its best state, but the Empire will endure.\""
  ANI_LEADER_ESDEATH_NAME: "Esdeath"
  ANI_LEADER_ESDEATH_DESC: "Sadistic and cruel, Esdeath is renowned for her merciless rule over the empire. Despite this, many still find solace in her presence.\n\n\"Panicking leads to an early grave.\""
  ANI_LEADER_LALATINA_DUSTINESS_FORD_NAME: "Lalatina Dustiness Ford"
  ANI_LEADER_LALATINA_DUSTINESS_FORD_DESC: "Empress of the empire, Lalatina Dustiness Ford is a powerful and influential figure who has shaped the course of history. Tough, smart, and ready to defend her people head-first, she's well-loved even among the male population.\n\n\"I've never taken a direct hit with such firepower before.\""
  ANI_LEADER_KAGANE_MINA_NAME: "Kagane Mina"
  ANI_LEADER_KAGANE_MINA_DESC: "A communist reformer with some... wild ideas, Mina rose to great prominence among the world's communists and is known for her fiery personality and sharp wit. Despite her sometimes eccentric views, she remains a respected leader in the empire.\n\n\"The world is cruel. Why make it more cruel?\""