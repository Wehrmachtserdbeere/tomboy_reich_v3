l_english:
  CEU_LEADER_MARIAN_ZYNDRAM_KOSCIALKOWSKI_NAME: "Marian Zyndram-Kościałkowski"
  CEU_LEADER_MARIAN_ZYNDRAM_KOSCIALKOWSKI_DESC: "Marian Zyndram-Kościałkowski is a politician of Poland who, following the unification of the Central European Union, became the first Chancellor of the Union. Standing for a Democratic Socialist but not Marxist ideal, he's fairly unpopular, only made worse by his affiliation with freemasons.\n\n\"Europe will either stand united or fall divided.\""
  CEU_LEADER_KURT_SCHUMACHER_NAME: "Kurt Schumacher"
  CEU_LEADER_KURT_SCHUMACHER_DESC: "A Social Democrat at heart, Kurt Schumacher was Marian Zyndram-Kościałkowski's political rival, and has been the leader of the German Social Democratic Party since the beginning of the Anime War.\n\n\"Before anything else, democracy must be defended.\""
  CEU_LEADER_WLADYSLAW_GOMULKA_NAME: "Władysław Gomułka"
  CEU_LEADER_WLADYSLAW_GOMULKA_DESC: "Władysław Gomułka is a die-hard Marxist and Polish ethno-nationalist, either deeply loved or bitterly hated among the Union. His fellow communists keep his nationalism in check, but deep down, he wishes for nothing but the extermination of all non-Poles and anyone critical of his idea of a Great, Purified Poland.\n\n\"With Marx as my witness, I will bring the revolution to all of Europe!\""
  CEU_LEADER_ERNST_THAELMANN_NAME: "Ernst Thälmann"
  CEU_LEADER_ERNST_THAELMANN_DESC: "One of the founding fathers of modern Socialism, Ernst is a fierce fighter and ideologue of Socialism as taught by Marx, Engels, and most importantly, Lenin and Stalin. Near-fanatical, he's kept in check by his fellow communists similar to his rival, Władysław Gomułka.\n\n\"The most valuable thing a human owns is their life; They must spend it all for the struggle to liberate mankind!\""
  CEU_LEADER_VIKTORIA_NAME: "Viktoria I."
  CEU_LEADER_VIKTORIA_DESC: "Prussian princess and famous tomboy, Viktoria Louise of Prussia is the most important symbol of post-war reconciliation between the Human and Anime powers in Europe. Although popular among the youth, her cordial approach to issues relating to the Anime Empire and its subjects leave many veterans and members of the old guard estranged and angry with her.\n\n\"May I be more fortunate than Barbarossa, and better than Karl.\""
  CEU_LEADER_COUNCIL_OF_SIX_REPRESENTATIVES_NAME: "Council of the Six Representatives"
  CEU_LEADER_COUNCIL_OF_SIX_REPRESENTATIVES_DESC: "As a collective union of ethno-nationalist states, the European Front is led by the Council of Six Representatives, with each representative being an elected official of its constituent nations: Germany, Poland, Czechia, Slovakia, Austria, and one for all lands not included in the former five.\n\n\"Europeans have always, are, and will always win in the end.\""
  CEU_LEADER_TRIARCHY_NAME: "The Triarchy"
  CEU_LEADER_TRIARCHY_DESC: "The Triarchy of Kaiser Wilhelm of Germany, Król Karl Albrecht of Poland, and Kaiser Karl Franz of Austria rules the Central Europe together, with each governing their own historical territories while collaborating with each other.\n\n\"Gott mit uns; Bóg, Honor, Ojczyzna; Gott erhalte, Gott beschütze!\""
  CEU_LEADER_WILHELM_II_NAME: "Wilhelm II."
  CEU_LEADER_WILHELM_II_DESC: "Previously disgraced after the Great War, Kaiser Wilhelm II brought his honor back in the battles he personally led in the Anime War. Although quite aged by now, he still rules the Triarchy of Central Europe with the grace and efficiency of someone who has seen the darkest of pits before.\n\n\"There is only one person who is master in this Empire and I am not going to tolerate any other.\""
  CEU_LEADER_WILHELM_III_NAME: "Wilhelm III."
  CEU_LEADER_WILHELM_III_DESC: "Son of Wilhelm II, Wilhelm III hasn't seen the depths of hell in the Anime War, as his father shielded him from service, but having studied the Great War and the Anime War extensively, most people are sure he will lead the nation to prosperity.\n\n\"Germania has found good friends in Austria and Polonia.\""
  CEU_LEADER_KARL_I_NAME: "Karl I."
  CEU_LEADER_KARL_I_DESC: "Karl I, also referred to as Karl Albrecht to differenciate him from Karl Franz, is the rightful Król of Poland, and although uncertainty surrounds him, many Poles look up to him with hope, as the Polish Crown once again has a head to sit on.\n\n\"Habsburg or not, I will lead this realm to freedom and prosperity.\""