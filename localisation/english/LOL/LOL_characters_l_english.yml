l_english:
  LOL_LEADER_SENKO_SAN_NAME: "Senko-San"
  LOL_LEADER_SENKO_SAN_DESC: "Senko-San is a cheerful and pampering girl, who calls herself a kitsune spirit and claims to have lived for thousands of years. Her demeanor and sweet behavior has made her a favorite among the population, and greatly helped the popularity of democratic principles.\n\n\"I'm going to step on you.\""
  LOL_LEADER_KATYUSHA_NAME: "Katyusha"
  LOL_LEADER_KATYUSHA_DESC: "A Russian-born girl, Katyusha is well known for her short temper and fanatic love of Communism. Despite her occasionally abhorrent personality, she became a loved candidate among the Communists, and after a brief meeting with Kagane Mina, is the representative of Minaist ideas and ideals.\n\n\"You prepared these tanks just to make Katyusha laugh, did you not? All of you are below Katyusha! Your tanks, your technology and your height.\""
  LOL_LEADER_TANYA_DEGURECHAFF_NAME: "Tanya von Degurechaff"
  LOL_LEADER_TANYA_DEGURECHAFF_DESC: "Cold, cruel, and brutal - no other words can truly encapsulate who the German-born Tanya is. Despite her ruthless nature, Tanya's strategic genius and unwavering dedication to the Empire have earned her a significant following among the military and conservative factions, and surprisingly a lot of previously liberal factions seem to have become incredibly loyal to her, with many anti-war pioneers having volunteered to be trained by her personally. Her leadership style is often described as merciless, yet effective.\n\n\"In war, there are no winners, only survivors.\""
  LOL_LEADER_CHLOE_VON_EINZBERG_NAME: "Chloe von Einzbern"
  LOL_LEADER_CHLOE_VON_EINZBERG_DESC: "Chloe von Einzbern is known for her devious and manipulative nature, often using her charm and cunning to achieve her goals. Despite her morally ambiguous actions, Chloe has garnered a significant following among those who value pragmatism and results over ideology. Her leadership style is often described as opportunistic, as she is willing to make alliances and compromises to further her agenda.\n\n\"Isn't there something you have to do? Come on, I'll keep you company, so let's go together.\""