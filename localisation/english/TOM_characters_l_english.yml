l_english:
  TOM_LEADER_KAY_NAME: "Kay"
  TOM_LEADER_KAY_DESC: "The leader of Saunders University High School and a prominent fan of America, Kay is a tough tomboy who loves the military, and especially the Army, more than anything else.\n\n\"How about the doctrine of superior firepower? Attack one of theirs with ten of ours!\""
  TOM_LEADER_MIKASA_ACKERMAN_NAME: "Mikasa Ackerman"
  TOM_LEADER_MIKASA_ACKERMAN_DESC: "The ultimate weapon of the state, Mikasa is a powerful leader with a strong sense of duty and loyalty to her race.\n\n\"If you think it's natural for people to die for others. I'm sure you'll understand that at times.. the sacrifice of a single precious life can save many others.\""
  TOM_LEADER_ARTORIA_PENDRAGON_NAME: "Artoria Pendragon"
  TOM_LEADER_ARTORIA_PENDRAGON_DESC: "The King of Knights, Artoria is a wise and strong ruler for her people, who can trace back her origin to the Arthurian legends.\n\n\"A man without fear cannot be wise.\""
  TOM_LEADER_SULETTA_MERCURY_NAME: "Suletta Mercury"
  TOM_LEADER_SULETTA_MERCURY_DESC: "Born into a working-class family, Suletta is a hardworking leader who has dedicated herself to improving her community and making it a better place for everyone under the banner of Minaism.\n\n\"...\""
  